name: 🚀 Deploy NestJS Backend API to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Copy project to VPS
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.VPS_HOST }}
        username: calderond
        key: ${{ secrets.VPS_KEY }}
        source: "."
        target: "/home/calderond/posts_api"

    - name: Run deploy commands on VPS
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.VPS_HOST }}
        username: calderond
        key: ${{ secrets.VPS_KEY }}
        script: |
          set -e
          

          cd /home/calderond/posts_api


          fuser -k 3000/tcp || true


          printf "%s" "${{ secrets.ENV_FILE }}" > .env


          npm install
          npm run build

 
          pm2 stop nestjs-posts-api || true
          pm2 delete nestjs-posts-api || true
          pm2 start dist/main.js --name nestjs-posts-api
          pm2 save