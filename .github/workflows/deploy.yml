name: 🚀 Deploy NestJS ERP Inventory API

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Copy project to VPS
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.VPS_HOST }}
        username: calderond
        key: ${{ secrets.VPS_KEY }}
        source: "."
        target: "/home/calderond/proyecto_integrador_erp_inventario"

    - name: Run deploy commands on VPS
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.VPS_HOST }}
        username: calderond
        key: ${{ secrets.VPS_KEY }}
        script: |
          set -e
          

          cd /home/calderond/proyecto_integrador_erp_inventario

          # Limpiar archivos stale que SCP no elimina (ej: modulos removidos)
          rm -rf src/traspasos dist

          # Liberar el puerto 3000
          fuser -k 3000/tcp || true


          printf "%s" "${{ secrets.ENV_FILE }}" > .env


          npm install
          npm run build

          # Reiniciar proceso de PM2 con el nombre correcto
          pm2 stop calderon-erp-inventario-api || true
          pm2 delete calderon-erp-inventario-api || true
          pm2 start dist/main.js --name calderon-erp-inventario-api
          pm2 save